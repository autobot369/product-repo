name: PM-Focused Concept-to-Story Flow
version: 2.0.0
description: >
  Full PM execution workflow — concept → research → PRD+UX → architecture → stories.
  Orchestrated by Optimus Prime (pm agent) acting as pipeline owner across all phases.
  Skills are the canonical execution layer; BMM workflows in tools/bmm/workflows/
  are reference implementations only — skills take precedence.

  Execution model: interleaved single-session (one Claude Code context).
  Concurrency: interleaved (Optimus Prime and Bumblebee run in sequence within the same session,
  presented to the user as concurrent progress).
  Gates: party-mode sessions — Wheeljack joins as challenger, not as a workflow runner.
  Handoff: each phase writes tools/bmm/output/handoff-{phase}.md before the gate runs.

# ── Skill registry ──────────────────────────────────────────────────────────────
# All execution is through skills. Agents load the skill file and follow it exactly.
# BMM workflow files in tools/bmm/workflows/ are the step-level reference;
# skills wrap them with output contracts, handoff writes, and gate awareness.

skills:
  create-product-brief: ".claude/skills/create-product-brief.md"
  market-research:       ".claude/skills/market-research.md"
  create-prd:            ".claude/skills/create-prd.md"
  ux-journeys:           ".claude/skills/ux-journeys.md"
  create-architecture:   ".claude/skills/create-architecture.md"
  confluence-user-stories: ".claude/skills/confluence-user-stories.md"
  user-stories:          ".claude/skills/user-stories.md"

# ── Output contract registry ────────────────────────────────────────────────────
# Each phase must satisfy its output contract before its gate runs.
# The orchestrator (Optimus Prime) checks these contracts before invoking party mode.

output_contracts:
  phase_01:
    brief:
      file: "tools/bmm/output/briefs/product-brief.md"
      required_sections: [Problem Statement, Target User, Success Metrics, Scope, Out of Scope]
    research:
      file: "tools/bmm/output/research/research-findings.md"
      required_sections: [Executive Summary, Competitive Landscape, Market Lens, Opportunity Assessment, Recommendations]
      min_recommendations: 3

  phase_02:
    prd:
      file: "tools/bmm/output/prds/final-prd.md"
      required_sections: [Problem & Opportunity, Objective, Success Metrics, Functional Requirements, Non-Functional Requirements, User Journeys, Out of Scope]
      min_success_metrics: 2
      ux_journeys_embedded: true   # Arcee's output must be present before gate

  phase_03:
    architecture:
      file: "tools/bmm/output/architecture-decisions.md"
      required_sections: [Context Summary, Data Model, API Contracts, Key Decisions, Open Technical Risks]
      min_decisions: 3
      coverage_checklist_complete: true

  phase_04:
    story_intent:
      file: "tools/bmm/output/stories/story-intent.md"
      required_per_feature: [user_story_statement, acceptance_criteria, prd_section_reference]
    stories:
      dir: "tools/bmm/output/stories/"
      format: gherkin
      required_per_story: [given_when_then, acceptance_criteria, prd_requirement_reference]
      validator: gherkin_validator

# ── Phases ──────────────────────────────────────────────────────────────────────

phases:

  # ────────────────────────────────────────────────────────────────────────────
  - phase: 01_Accelerated_Context_Discovery
    label: "Phase 01 — Accelerated Context Discovery"
    orchestrator: pm              # Optimus Prime drives sequencing
    execution_model: interleaved  # Bumblebee then Optimus Prime, presented as concurrent progress

    steps:

      - name: remote_context
        label: "Remote Context Discovery"
        agent: pm
        exec: "{project-root}/tools/bmm/tasks/remote-context-discovery.md"
        description: >
          Optimus Prime runs remote context discovery first — search Confluence and Jira
          for related PRDs, research, and prior briefs. Results are shared as
          context for both the brief and the research steps.

      - name: market_research
        label: "Market Research — Bumblebee"
        agent: analyst
        skill: ".claude/skills/market-research.md"
        bmm_workflow: "{project-root}/tools/bmm/workflows/1-analysis/research/workflow-market-research.md"
        output: "tools/bmm/output/research/research-findings.md"
        description: >
          Optimus Prime loads Bumblebee's agent file (.claude/agents/analyst.md) and embodies her
          persona. Runs /market-research skill. Output: research-findings.md.
          On completion, signals research_complete in handoff file.

      - name: product_brief
        label: "Product Brief — Optimus Prime"
        agent: pm
        skill: ".claude/skills/create-product-brief.md"
        bmm_workflow: "{project-root}/tools/bmm/workflows/1-analysis/create-product-brief/workflow.md"
        params:
          skip_if_exists: true
        output: "tools/bmm/output/briefs/product-brief.md"
        description: >
          Optimus Prime resumes as himself. Runs /create-product-brief skill.
          Reads research-findings.md if complete — pre-populates opportunity data.
          On completion, signals brief_complete in handoff file.

      - name: write_phase01_handoff
        label: "Write Phase 01 Handoff"
        agent: pm
        action: write_handoff
        template: "{project-root}/tools/bmm/data/handoff-template.md"
        output: "tools/bmm/output/handoff-01.md"
        description: >
          Optimus Prime writes the phase handoff doc. Records outputs produced, open questions,
          and key context for the gate and Phase 02.

    gate:
      name: strategic_alignment
      label: "Gate 01 — Strategic Alignment"
      mechanism: party-mode
      party_mode_workflow: "{project-root}/tools/bmm/core/workflows/party-mode/workflow.md"
      participants: [analyst, pm, architect]
      participant_roles:
        analyst: "Bumblebee presents research findings and surface-level market risks"
        pm:      "Optimus Prime presents the product brief — problem, user, metrics, scope"
        architect: "Wheeljack challenges technical feasibility and surfaces blockers"
      agenda:
        - "Bumblebee: 3-minute research summary — top 3 findings that affect the brief"
        - "Optimus Prime: brief walkthrough — problem, user, metrics, scope"
        - "Wheeljack: feasibility challenge — what needs investigation before Phase 02?"
        - "All: agree on outcome"
      output_contract_check: phase_01   # Optimus Prime checks contracts before launching party mode
      outcomes:
        go:
          description: "All three aligned — proceed to Phase 02"
          action: proceed_to_phase_02
          handoff_signal: gate_01_passed
        amend_brief:
          description: "Brief needs targeted revision — do not re-run research"
          action: return_to_step_product_brief
          amend_scope: brief_only
          handoff_signal: gate_01_amend
        no_go:
          description: "Fundamental problem with viability — workflow terminates"
          action: terminate
          requires: decision_log_written
          handoff_signal: gate_01_no_go

  # ────────────────────────────────────────────────────────────────────────────
  - phase: 02_Solutioning_Sprint
    label: "Phase 02 — Solutioning Sprint"
    orchestrator: pm
    execution_model: interleaved  # Optimus Prime then Arcee, building into the same file
    prerequisite: gate_01_passed

    steps:

      - name: load_phase01_handoff
        label: "Load Phase 01 Handoff"
        agent: pm
        action: read_handoff
        file: "tools/bmm/output/handoff-01.md"
        description: >
          Optimus Prime reads handoff-01.md completely before starting. Carries forward all
          context, open questions, and Wheeljack's feasibility notes into the PRD.

      - name: prd_authoring
        label: "PRD Authoring — Optimus Prime"
        agent: pm
        skill: ".claude/skills/create-prd.md"
        bmm_workflow: "{project-root}/tools/bmm/workflows/2-plan-workflows/create-prd/workflow-create-prd.md"
        params:
          include_nfr: true
          template: "{project-root}/tools/bmm/workflows/2-plan-workflows/create-prd/templates/prd-template.md"
          reads:
            - "tools/bmm/output/briefs/product-brief.md"
            - "tools/bmm/output/research/research-findings.md"
        output: "tools/bmm/output/prds/final-prd.md"
        description: >
          Optimus Prime authors the full PRD. Reads brief + research as primary inputs.
          Leaves the User Journeys subsection of Functional Requirements empty —
          marked with a placeholder: "<!-- Arcee: embed journeys here -->".
          Signals prd_skeleton_complete when structure is written but before Arcee's section.

      - name: ux_journeys_inline
        label: "UX Journeys Inline — Arcee"
        agent: ux-designer
        skill: ".claude/skills/ux-journeys.md"
        bmm_workflow: "{project-root}/tools/bmm/workflows/2-plan-workflows/create-ux-design/workflow.md"
        params:
          output_mode: inline
          target_file: "tools/bmm/output/prds/final-prd.md"
          target_section: "Functional Requirements"
          reads:
            - "tools/bmm/output/briefs/product-brief.md"
            - "tools/bmm/output/research/research-findings.md"
            - "docs/user-journeys/"
        description: >
          Optimus Prime loads Arcee's agent file (.claude/agents/ux-designer.md) and embodies her.
          Runs /ux-journeys skill. Appends journey maps to the PRD's Functional Requirements
          section. Does not overwrite Optimus Prime's content. Signals ux_journeys_complete on finish.

      - name: prd_validation
        label: "PRD Validation"
        agent: pm
        exec: "{project-root}/tools/bmm/workflows/2-plan-workflows/create-prd/workflow-validate-prd.md"
        input: "tools/bmm/output/prds/final-prd.md"
        description: >
          Optimus Prime re-assumes PM role. Runs the 12-step PRD validator automatically.
          Any validation failure must be resolved before the gate runs.
          Validator output is appended as a checklist to the PRD frontmatter.

      - name: write_phase02_handoff
        label: "Write Phase 02 Handoff"
        agent: pm
        action: write_handoff
        template: "{project-root}/tools/bmm/data/handoff-template.md"
        output: "tools/bmm/output/handoff-02.md"

    gate:
      name: technical_readiness
      label: "Gate 02 — Technical Readiness Review"
      mechanism: party-mode
      party_mode_workflow: "{project-root}/tools/bmm/core/workflows/party-mode/workflow.md"
      participants: [pm, ux-designer, architect]
      participant_roles:
        pm:          "Optimus Prime presents the PRD — requirements, metrics, scope"
        ux-designer: "Arcee walks through the embedded user journeys"
        architect:   "Wheeljack validates that every journey step has a supportable data model"
      agenda:
        - "Optimus Prime: PRD walkthrough — requirements and success metrics"
        - "Arcee: journey walkthrough — happy paths, failure states, edge cases"
        - "Wheeljack: feasibility audit — flag any requirement that needs architectural investigation"
        - "All: confirm no ambiguities that would block architecture work"
      output_contract_check: phase_02
      prerequisite_check:
        file: "tools/bmm/output/prds/final-prd.md"
        validator_passed: true    # PRD validation must pass before gate launches
      outcomes:
        go:
          description: "PRD and journeys are complete and unambiguous — Wheeljack can start Phase 03"
          action: proceed_to_phase_03
          handoff_signal: gate_02_passed
        open_items:
          description: "Specific sections need clarification — targeted fix only"
          action: return_to_specific_step
          amend_scope: flagged_sections_only
          handoff_signal: gate_02_open_items
        no_go:
          description: "PRD is not ready for architecture — fundamental gaps exist"
          action: return_to_phase_02_start
          handoff_signal: gate_02_no_go

  # ────────────────────────────────────────────────────────────────────────────
  - phase: 03_Architecture_and_Readiness
    label: "Phase 03 — Architecture & Technical Readiness"
    orchestrator: pm
    execution_model: sequential   # Wheeljack runs alone; Optimus Prime + Arcee available for queries
    prerequisite: gate_02_passed

    steps:

      - name: load_phase02_handoff
        label: "Load Phase 02 Handoff"
        agent: architect
        action: read_handoff
        file: "tools/bmm/output/handoff-02.md"
        description: >
          Optimus Prime loads Wheeljack's agent file (.claude/agents/architect.md) and embodies him.
          Wheeljack reads handoff-02.md completely before touching the PRD.

      - name: arch_alignment
        label: "Architecture Alignment — Wheeljack"
        agent: architect
        skill: ".claude/skills/create-architecture.md"
        bmm_workflow: "{project-root}/tools/bmm/workflows/3-solutioning/create-architecture/workflow.md"
        params:
          scope: data-model-and-apis-only
          input: "tools/bmm/output/prds/final-prd.md"
        output: "tools/bmm/output/architecture-decisions.md"
        description: >
          Wheeljack runs /create-architecture skill. Reads locked final-prd.md as single input.
          Produces data model + API contracts + decisions + risks.
          May query Optimus Prime or Arcee inline if a requirement is ambiguous — but does not reopen
          the PRD without gate approval.

      - name: implementation_readiness_check
        label: "Implementation Readiness Check"
        agent: architect
        exec: "{project-root}/tools/bmm/workflows/3-solutioning/check-implementation-readiness/workflow.md"
        params:
          prd: "tools/bmm/output/prds/final-prd.md"
          architecture: "tools/bmm/output/architecture-decisions.md"
        output: "tools/bmm/output/readiness-report.md"
        description: >
          Wheeljack runs the readiness check as an automated validator — not a party session.
          Produces readiness-report.md with pass/fail per requirement.
          Gaps found here are returned to Optimus Prime for targeted PRD amendment (not full Phase 02 re-run).

      - name: write_phase03_handoff
        label: "Write Phase 03 Handoff"
        agent: architect
        action: write_handoff
        template: "{project-root}/tools/bmm/data/handoff-template.md"
        output: "tools/bmm/output/handoff-03.md"

    gate:
      name: implementation_readiness
      label: "Gate 03 — Implementation Readiness"
      mechanism: automated_then_party
      description: >
        Primary check is the automated readiness report. Party mode only if gaps are found.
        If readiness-report.md shows all-pass, gate auto-passes — no party session needed.
        If gaps exist, party mode with Optimus Prime + Wheeljack to resolve targeted items.
      auto_pass_condition: "readiness-report.md: all_checks_pass = true"
      party_mode_workflow: "{project-root}/tools/bmm/core/workflows/party-mode/workflow.md"
      participants: [pm, architect]
      output_contract_check: phase_03
      outcomes:
        ready:
          description: "All requirements traceable, architecture complete — proceed to backlog"
          action: proceed_to_phase_04
          handoff_signal: gate_03_passed
        gaps_found:
          description: "Specific PRD sections need amendment — targeted return to Phase 02"
          action: return_to_phase_02_targeted
          amend_scope: flagged_prd_sections_only
          handoff_signal: gate_03_gaps

  # ────────────────────────────────────────────────────────────────────────────
  - phase: 04_One_Shot_Backlog
    label: "Phase 04 — One-Shot Backlog"
    orchestrator: pm
    execution_model: interleaved  # Optimus Prime then Ironhide — handshake protocol
    prerequisite: gate_03_passed

    steps:

      - name: load_phase03_handoff
        label: "Load Phase 03 Handoff"
        agent: pm
        action: read_handoff
        file: "tools/bmm/output/handoff-03.md"
        description: >
          Optimus Prime resumes as himself. Reads handoff-03.md — carries forward
          Wheeljack's risk flags and open items into story authoring.

      - name: story_intent
        label: "Story Intent — Optimus Prime"
        agent: pm
        skill: ".claude/skills/confluence-user-stories.md"
        params:
          mode: intent_only       # produce story intent + AC — not full Jira push
          reads:
            - "tools/bmm/output/prds/final-prd.md"
            - "tools/bmm/output/architecture-decisions.md"
        output: "tools/bmm/output/stories/story-intent.md"
        description: >
          Optimus Prime runs /confluence-user-stories in intent-only mode.
          Produces story intent doc: user story statement + acceptance criteria
          + PRD section reference per requirement. Does not push to Jira yet.
          Signals story_intent_complete on finish.

      - name: gherkin_stories
        label: "Gherkin Stories + Jira — Ironhide"
        agent: sm
        skill: ".claude/skills/user-stories.md"
        bmm_workflow: "{project-root}/tools/bmm/workflows/4-implementation/create-story/workflow.yaml"
        params:
          format: gherkin
          include_implementation_notes: true
          single_epic: true
          reads:
            - "tools/bmm/output/stories/story-intent.md"
            - "tools/bmm/output/prds/final-prd.md"
        output: "tools/bmm/output/stories/"
        description: >
          Optimus Prime loads Ironhide's agent file (.claude/agents/sm.md) and embodies him.
          Ironhide runs /user-stories skill. Consumes Optimus Prime's story-intent.md —
          converts each intent into full Gherkin format, resolves Jira epic,
          checks for duplicates, and pushes stories to Jira.
          Signals stories_complete on finish.

      - name: gherkin_validator
        label: "Automated Gherkin Validator"
        agent: sm
        type: post-process
        exec: "{project-root}/tools/bmm/tasks/remote-context-discovery.md"
        params:
          mode: fundamental-analysis
          checks:
            - every_story_has_given_when_then
            - every_story_maps_to_prd_requirement
            - every_prd_requirement_has_min_one_story
            - no_duplicate_jira_keys
          fail_on: any
          report_output: "tools/bmm/output/gherkin-validation-report.md"
        description: >
          Ironhide runs the Gherkin validator as a post-process.
          Fails hard on any violation — does not proceed to publish until all pass.
          On failure: Ironhide re-runs only the failing stories (not the full phase).
          Signals gherkin_validator_passed on all-pass.

      - name: publish_approval
        label: "Publish Approval — Optimus Prime"
        agent: pm
        action: approve_publish
        description: >
          Optimus Prime resumes and presents the validation report.
          Asks user to approve publish. On approval: push PRD to Confluence,
          confirm Jira stories are created, update handoff signals.

    gate:
      name: backlog_complete
      label: "Gate 04 — Backlog Complete"
      mechanism: automated
      auto_pass_condition: "gherkin-validation-report.md: all_checks_pass = true AND user_approved_publish = true"
      outcomes:
        complete:
          description: "All stories valid, user approved — workflow complete"
          action: terminate_success
          handoff_signal: workflow_complete
        validator_failures:
          description: "Gherkin validator found issues — Ironhide re-runs failing stories"
          action: return_to_step_gherkin_stories
          amend_scope: failing_stories_only

# ── Output structure ────────────────────────────────────────────────────────────

output:
  root: "{project-root}/tools/bmm/output"
  structure:
    briefs:       "briefs/product-brief.md"
    research:     "research/research-findings.md"
    prds:         "prds/final-prd.md"
    architecture: "architecture-decisions.md"
    readiness:    "readiness-report.md"
    stories:      "stories/"
    validation:   "gherkin-validation-report.md"
    handoffs:
      phase_01:   "handoff-01.md"
      phase_02:   "handoff-02.md"
      phase_03:   "handoff-03.md"

publish:
  on_workflow_complete:
    prds_target:      "{project-root}/docs/PRDs"
    research_target:  "{project-root}/docs/research"
    confluence_push:  true    # Optimus Prime pushes PRD to Confluence on publish approval
    jira_stories:     true    # Ironhide has already pushed stories during phase 04
