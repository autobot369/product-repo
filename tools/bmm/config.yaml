# BMM Per-Repo Configuration
# Global engine: ~/.claude/bmm/ | Global agents: ~/.claude/agents/ | Global skills: ~/.claude/skills/
# Only project-specific fields live here. All agents load this file on activation.

project_name: product-repo
user_skill_level: intermediate   # beginner | intermediate | expert

# Knowledge base — agents read from here for context
project_knowledge: "{project-root}/docs"

# All generated artifacts land here (gitignored — commit selectively to docs/)
output_folder: "{project-root}/tools/bmm/output"

# Docs sub-folders (used by agents for targeted reads)
docs_prds: "{project-root}/docs/PRDs"
docs_research: "{project-root}/docs/research"
docs_user_journeys: "{project-root}/docs/user-journeys"
docs_specs: "{project-root}/docs/specs"
docs_product_log: "{project-root}/docs/product-log"

# User preferences
user_name: PM
communication_language: English
document_output_language: English
primary_model: claude-sonnet-4-6

# PRD intake mode: strategic-core | step-by-step
prd_intake_mode: strategic-core

# Strategic Core intake template (pre-fill to skip discovery questions)
strategic_core_template:
  problem_statement:
    what: ""
    who: ""
    why_now: ""
    current_workaround: ""
  target_user:
    segment: ""
    context: ""
    job_to_be_done: ""
    pain_intensity: ""   # low | medium | high | critical
  success_metrics:
    primary_kpi: ""
    secondary_kpis: []
    cr_impact: ""
    aov_impact: ""
    time_to_validate: ""
