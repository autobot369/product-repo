# Global Tools Config — shared by all tools in tools/
# Credentials are NEVER stored here — use .env at repo root.
# ATLASSIAN_EMAIL and ATLASSIAN_API_TOKEN are loaded from .env automatically.

atlassian:
  base_url: https://your-org.atlassian.net

# Canonical output directories (relative to repo root)
output:
  prds:     docs/PRDs/
  abtests:  docs/experiments/
  specs:    docs/specs/
  research: docs/research/

# Jira project keys used across tools
jira:
  projects:
    squad1: SQUAD1
    squad2: SQUAD2

# Confluence spaces
confluence:
  spaces:
    - key: TEAM
      label: "Product Team"

# Tool-specific config sections

confluence_migration:
  cache:
    dir:     tools/confluence-migration/cache/
    enabled: true
  gates:
    pause_after_fetch:    true
    pause_after_classify: true
    pause_after_convert:  false

jira_monitor:
  gates:
    pause_before_publish: true
  stale_epic_days: 60
  confluence:
    sprint_reviews_parent:   ""   # parent page — each sprint review is created as a child
    demand_review_page_id:   ""   # page to prepend demand review digests to
    release_tracker_page_id: ""   # page to prepend release tracker reports to
    pipeline_page_id:        ""   # page to prepend feature pipeline reports to

pm_workers:
  # Confluence space agents read for context and publish PRDs/research to
  read_space:    TEAM
  publish_space: TEAM

  # Parent page for new PRDs
  prd_parent_page_id: ""

  # Confluence parent page for monthly market-research reports
  market_research_parent_page_id: ""

  # Jira defaults for story creation
  default_jira_project: SQUAD1
  story_label: pm-agent-generated

  # Scheduler: when and what to run for the monthly market-research scan
  scheduler:
    fire_day:  4           # day of month (1–28)
    fire_hour: 9           # hour in 24h format
    fire_min:  0
    timezone:  UTC         # pytz timezone string, e.g. "America/New_York", "Europe/London"
    topic:     "Tier 1 competitor and innovation trends monthly scan"
